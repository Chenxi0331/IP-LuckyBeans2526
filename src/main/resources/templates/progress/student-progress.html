<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Progress - Innerly</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>



    <!-- Main Content -->
    <main id="page-content-wrapper" class="main-content" style="margin-left: 260px; padding: 2rem;">
        <div class="page-header">
            <h1>Student Progress</h1>
            <p th:text="'Detailed progress for ' + ${student.username}">Student progress tracking</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card shadow-sm border-0" style="border-radius: 12px;">
                    <div class="card-header text-white py-3"
                        style="background: linear-gradient(135deg, #a855f7 0%, #9333ea 100%); border-radius: 12px 12px 0 0;">
                        <h2 th:text="'Progress for ' + ${student.username}" class="mb-0 fs-4">Progress for Student</h2>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" style="width: 25%;">Date</th>
                                        <th scope="col" style="width: 25%;">Mood</th>
                                        <th scope="col">Note</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="entry : ${entries}">
                                        <td th:text="${entry.date}" class="fw-medium"></td>
                                        <td th:text="${entry.mood}"></td>
                                        <td th:text="${entry.note}" class="text-muted"></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(entries)}">
                                        <td colspan="3" class="text-center text-muted py-5">
                                            <div class="mb-3" style="font-size: 48px; opacity: 0.5;">📊</div>
                                            <p class="mb-0">No progress entries yet</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-light text-center py-3">
                        <a href="/dashboard" class="btn btn-sm"
                            style="background: #6b7280; color: white; padding: 8px 24px; border-radius: 8px; text-decoration: none;">
                            Back to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
