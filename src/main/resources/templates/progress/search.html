<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innerly | Student Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --innerly-bg: #f8fafc;
            --innerly-primary: #6366f1;
            --innerly-text-main: #1e293b;
            --innerly-text-muted: #64748b;
        }

        body {
            background-color: var(--innerly-bg);
            font-family: 'Outfit', sans-serif;
            color: var(--innerly-text-main);
        }

        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .search-card {
            background: white;
            border-radius: 1.25rem;
            border: 1px solid rgba(226, 232, 240, 0.7);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            overflow: hidden;
        }

        .student-row {
            transition: all 0.2s ease;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }

        .student-row:hover {
            background-color: #f8fafc;
        }

        .avatar-circle {
            width: 45px;
            height: 45px;
            background-color: #e0e7ff;
            color: #6366f1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 600;
        }

        .btn-view {
            border-radius: 0.75rem;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
        }
    </style>
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main id="page-content-wrapper" class="py-5" style="margin-left: 260px;">
        <div class="dashboard-container px-4">
            <div class="mb-5">
                <h1 class="fw-bold h2 mb-1">Student Progress Search</h1>
                <p class="text-muted">Select a student to view their emotional trends and summary.</p>
            </div>

            <div class="search-card">
                <!-- Simple Header -->
                <div class="bg-light p-3 border-bottom d-none d-md-block">
                    <div class="row align-items-center text-muted small fw-bold text-uppercase px-3">
                        <div class="col-6">Student Info</div>
                        <div class="col-3 text-center">Privacy</div>
                        <div class="col-3 text-end">Action</div>
                    </div>
                </div>

                <div class="card-body p-0">
                    <div th:each="std : ${students}" class="student-row p-4 row align-items-center g-0"
                        th:onclick="'window.location.href=\'/progress/students/' + ${std.id} + '\''">

                        <div class="col-6 d-flex align-items-center gap-3">
                            <div class="avatar-circle"
                                th:text="${std.username != null && !std.username.isEmpty() ? #strings.substring(std.username,0,1).toUpperCase() : 'S'}">
                                S
                            </div>
                            <div>
                                <h6 class="mb-0 fw-bold" th:text="${std.username}">student_user</h6>
                                <small class="text-muted" th:text="${std.email}">student@email.com</small>
                            </div>
                        </div>

                        <div class="col-3 text-center">
                            <span th:if="${std.consentMoodSharing}"
                                class="badge bg-success-subtle text-success rounded-pill px-3 py-2">
                                <i class="bi bi-check-circle me-1"></i> Sharing
                            </span>
                            <span th:if="${!std.consentMoodSharing}"
                                class="badge bg-secondary-subtle text-muted rounded-pill px-3 py-2">
                                <i class="bi bi-lock me-1"></i> Private
                            </span>
                        </div>

                        <div class="col-3 text-end">
                            <a th:href="@{/progress/students/{id}(id=${std.id})}" class="btn btn-primary btn-view">
                                View Summary <i class="bi bi-arrow-right ms-1"></i>
                            </a>
                        </div>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${#lists.isEmpty(students)}" class="py-5 text-center">
                        <i class="bi bi-people fs-1 text-light-emphasis mb-3 d-block"></i>
                        <h5 class="text-muted">No students found.</h5>
                    </div>
                </div>
            </div>

            <div class="mt-4 text-center">
                <p class="small text-muted">
                    <i class="bi bi-shield-lock me-1"></i> Student privacy is protected. You will only see data they
                    have consented to share.
                </p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
