<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Sessions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="page-content-wrapper" class="container py-5" style="margin-left: 260px;">
        <h2 class="mb-4">My Counselling Sessions</h2>
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <!-- Filter Row -->
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <input type="text" id="searchInput" placeholder="Search..." class="form-control">
                        </div>
                        <div class="col-md-3">
                            <select id="statusFilter" class="form-control">
                                <option value="">All Status</option>
                                <option value="PENDING">Pending</option>
                                <option value="APPROVED">Approved</option>
                                <option value="COMPLETED">Completed</option>
                                <option value="REJECTED">Rejected</option>
                            </select>
                        </div>
                    </div>

                    <table class="table table-striped mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Session Type</th>
                                <!-- Show Counsellor Name for Students, Student Name for Counsellors/Admin -->
                                <th th:if="${#authorization.expression('hasRole(''STUDENT'')')}">Counsellor</th>
                                <th th:unless="${#authorization.expression('hasRole(''STUDENT'')')}">Student</th>
                                <th>Status</th>
                                <th>Details</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${sessions}">
                                <td th:text="${#temporals.format(s.sessionDate, 'MMM dd, yyyy')}"></td>
                                <td th:text="${#temporals.format(s.sessionDate, 'HH:mm')}"></td>
                                <td th:text="${s.sessionType}"></td>

                                <td th:if="${#authorization.expression('hasRole(''STUDENT'')')}"
                                    th:text="${s.counsellor != null ? s.counsellor.fullName : 'N/A'}"></td>
                                <td th:unless="${#authorization.expression('hasRole(''STUDENT'')')}"
                                    th:text="${s.student != null ? s.student.fullName : 'N/A'}"></td>

                                <td>
                                    <span class="badge"
                                        th:classappend="${s.status == 'APPROVED' ? 'bg-success' : (s.status == 'PENDING' ? 'bg-warning' : 'bg-secondary')}"
                                        th:text="${s.status}"></span>
                                </td>
                                <td>
                                    <!-- Meeting Link Display -->
                                    <div
                                        th:if="${s.status == 'APPROVED' and s.meetingLink != null and s.meetingLink != ''}">
                                        <small class="text-muted">Location/Link:</small><br>
                                        <span th:text="${s.meetingLink}" class="fw-bold text-primary"></span>
                                    </div>
                                </td>
                                <td>
                                    <!-- Student Action: Cancel -->
                                    <a th:if="${#authorization.expression('hasRole(''STUDENT'')') and s.status == 'PENDING'}"
                                        th:href="@{/counselling/cancel/{id}(id=${s.id})}" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Are you sure you want to cancel this session?');">Cancel</a>

                                    <!-- Counsellor Action: Attend -->
                                    <a th:if="${#authorization.expression('hasRole(''COUNSELOR'')') and s.status == 'APPROVED'}"
                                        th:href="@{/counselling/attend/{id}(id=${s.id})}"
                                        class="btn btn-sm btn-primary">Attend</a>

                                    <!-- View Student Notes (Reason) -->
                                    <button th:if="${s.studentNotes != null and s.studentNotes != ''}"
                                        class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal"
                                        data-bs-target="#studentNotesModal" th:data-content="${s.studentNotes}">Booking
                                        Details</button>

                                    <!-- View Session Notes (for both if completed) -->
                                    <button th:if="${s.status == 'COMPLETED'}" class="btn btn-sm btn-outline-info"
                                        data-bs-toggle="modal" data-bs-target="#notesModal"
                                        th:data-content="${s.notes}">View
                                        Report</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <script>
                        document.getElementById('searchInput')?.addEventListener('keyup', filterTable);
                        document.getElementById('statusFilter')?.addEventListener('change', filterTable);

                        function filterTable() {
                            const searchValue = document.getElementById('searchInput')?.value.toLowerCase() || '';
                            const statusValue = document.getElementById('statusFilter')?.value || '';
                            const table = document.querySelector('.table tbody');

                            Array.from(table.rows).forEach(row => {
                                const text = row.textContent.toLowerCase();
                                const status = row.querySelector('.badge')?.textContent || '';
                                let show = true;
                                if (searchValue && !text.includes(searchValue)) show = false;
                                if (statusValue && status !== statusValue) show = false;
                                row.style.display = show ? '' : 'none';
                            });
                        }
                    </script>
                </div>
            </div>
        </div>
    </div>

    <!-- Shared Modal for Session Notes/Report -->
    <div class="modal fade" id="notesModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Session Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <h6>Counselor Notes:</h6>
                    <p id="notesModalContent"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Shared Modal for Student Booking Notes -->
    <div class="modal fade" id="studentNotesModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Booking Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <h6>Student's Reason/Notes:</h6>
                    <p id="studentNotesModalContent"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Use event delegation or shared listeners for modals
        const notesModal = document.getElementById('notesModal');
        if (notesModal) {
            notesModal.addEventListener('show.bs.modal', event => {
                const button = event.relatedTarget;
                const content = button.getAttribute('data-content');
                notesModal.querySelector('#notesModalContent').textContent = content;
            });
        }

        const studentNotesModal = document.getElementById('studentNotesModal');
        if (studentNotesModal) {
            studentNotesModal.addEventListener('show.bs.modal', event => {
                const button = event.relatedTarget;
                const content = button.getAttribute('data-content');
                studentNotesModal.querySelector('#studentNotesModalContent').textContent = content;
            });
        }
    </script>
</body>

</html>
