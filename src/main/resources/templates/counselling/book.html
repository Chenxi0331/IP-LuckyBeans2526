<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Book Session</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="page-content-wrapper" class="container py-5" style="margin-left: 260px;">
        <div class="card mx-auto" style="max-width:720px;">
            <div class="card-body">
                <h4 class="card-title">Book Counselling Session</h4>
                <form th:action="@{/counselling/book}" th:object="${counsellingSession}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Select Preferred Counsellor</label>
                        <select class="form-select" name="counsellorId" required>
                            <option value="">-- Choose a Counsellor --</option>
                            <option th:each="c : ${counselors}" th:value="${c.id}" th:text="${c.fullName}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Session Type</label>
                        <select class="form-select" th:field="*{sessionType}" required>
                            <option value="">-- Select Session Type --</option>
                            <option value="individual">Individual Counselling</option>
                            <option value="group">Group Session</option>
                            <option value="follow-up">Follow-up Session</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Additional Notes (Optional)</label>
                        <textarea class="form-control" th:field="*{studentNotes}" rows="3"
                            placeholder="Write something to the counselor..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date & Time</label>
                        <input class="form-control" type="datetime-local" th:field="*{sessionDate}" required />
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary">Book</button>
                        <a th:href="@{/counselling}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
