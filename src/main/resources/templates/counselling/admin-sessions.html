<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Sessions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="page-content-wrapper" class="container py-5" style="margin-left: 260px;">
        <h2 class="mb-4">All Counselling Sessions</h2>
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Session Type</th>
                                <th>Student</th>
                                <th>Counsellor</th>
                                <th>Status</th>
                                <th>Notes</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${sessions}">
                                <td th:text="${s.id}" class="d-none"></td>
                                <td
                                    th:text="${s.sessionDate != null ? #temporals.format(s.sessionDate, 'MMM dd, yyyy') : '-'}">
                                </td>
                                <td
                                    th:text="${s.sessionDate != null ? #temporals.format(s.sessionDate, 'HH:mm') : '-'}">
                                </td>
                                <td th:text="${s.sessionType}"></td>
                                <td th:text="${s.student != null ? s.student.fullName : 'N/A'}"></td>
                                <td th:text="${s.counsellor != null ? s.counsellor.fullName : 'N/A'}"></td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${s.status == 'APPROVED' ? 'bg-success' : (s.status == 'PENDING' ? 'bg-warning' : 'bg-secondary')}"
                                        th:text="${s.status}"></span>
                                </td>
                                <td>
                                    <button th:if="${s.status == 'COMPLETED'}" class="btn btn-sm btn-outline-info"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#adminNotesModal' + ${s.id}">View</button>
                                    <span th:unless="${s.status == 'COMPLETED'}" class="text-muted">-</span>

                                    <!-- Modal for Notes -->
                                    <div class="modal fade" th:id="'adminNotesModal' + ${s.id}" tabindex="-1"
                                        aria-hidden="true">
                                        <div class="modal-dialog">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <h5 class="modal-title">Session Notes</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                                                        aria-label="Close"></button>
                                                </div>
                                                <div class="modal-body">
                                                    <p th:text="${s.notes}"></p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
