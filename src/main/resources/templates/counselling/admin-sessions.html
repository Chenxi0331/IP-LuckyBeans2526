<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Sessions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="page-content-wrapper" class="container py-5" style="margin-left: 260px;">
        <h2 class="mb-4">All Counselling Sessions</h2>
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Session Type</th>
                                <th>Student</th>
                                <th>Counsellor</th>
                                <th>Status</th>
                                <th>Details</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${sessions}">
                                <td th:text="${s.id}" class="d-none"></td>
                                <td
                                    th:text="${s.sessionDate != null ? #temporals.format(s.sessionDate, 'MMM dd, yyyy') : '-'}">
                                </td>
                                <td
                                    th:text="${s.sessionDate != null ? #temporals.format(s.sessionDate, 'HH:mm') : '-'}">
                                </td>
                                <td th:text="${s.sessionType}"></td>
                                <td th:text="${s.student != null ? s.student.fullName : 'N/A'}"></td>
                                <td th:text="${s.counsellor != null ? s.counsellor.fullName : 'N/A'}"></td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${s.status == 'APPROVED' ? 'bg-success' : (s.status == 'PENDING' ? 'bg-warning' : 'bg-secondary')}"
                                        th:text="${s.status}"></span>
                                </td>
                                <td>
                                    <div th:if="${s.meetingLink != null and s.meetingLink != ''}">
                                        <small class="text-muted"><i class="fas fa-map-marker-alt"></i>
                                            Location/Link:</small>
                                        <div th:text="${s.meetingLink}" class="fw-bold text-dark small"></div>
                                    </div>
                                    <span th:unless="${s.meetingLink != null and s.meetingLink != ''}"
                                        class="text-muted">-</span>
                                </td>
                                <td>
                                    <!-- Booking Details (Student Reason) -->
                                    <button th:if="${s.studentNotes != null and s.studentNotes != ''}"
                                        class="btn btn-sm btn-outline-secondary mb-1" data-bs-toggle="modal"
                                        data-bs-target="#adminStudentNotesModal"
                                        th:data-student-notes="${s.studentNotes}">Booking Details</button>

                                    <!-- Session Report (Counselor Notes) -->
                                    <button th:if="${s.status == 'COMPLETED'}" class="btn btn-sm btn-outline-info mb-1"
                                        data-bs-toggle="modal" data-bs-target="#adminNotesModal"
                                        th:data-notes="${s.notes}">View Report</button>
                                    <span th:unless="${s.status == 'COMPLETED'}" class="text-muted">-</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Shared Modal for Notes -->
    <div class="modal fade" id="adminNotesModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Session Notes</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="adminModalNotesContent"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Shared Modal for Booking Details -->
    <div class="modal fade" id="adminStudentNotesModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Booking Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <h6>Student's Reason:</h6>
                    <p id="adminModalStudentNotesContent"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const adminNotesModal = document.getElementById('adminNotesModal');
        if (adminNotesModal) {
            adminNotesModal.addEventListener('show.bs.modal', event => {
                const button = event.relatedTarget;
                const notes = button.getAttribute('data-notes');
                adminNotesModal.querySelector('#adminModalNotesContent').textContent = notes;
            });
        }

        const adminStudentNotesModal = document.getElementById('adminStudentNotesModal');
        if (adminStudentNotesModal) {
            adminStudentNotesModal.addEventListener('show.bs.modal', event => {
                const button = event.relatedTarget;
                const notes = button.getAttribute('data-student-notes');
                adminStudentNotesModal.querySelector('#adminModalStudentNotesContent').textContent = notes;
            });
        }
    </script>
</body>

</html>
