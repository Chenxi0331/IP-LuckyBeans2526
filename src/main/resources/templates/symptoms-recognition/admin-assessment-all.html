<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Assessments - Innerly Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <main id="page-content-wrapper" class="main-content" style="margin-left: 260px; padding: 2rem;">
        
        <!-- Back Button -->
        <a th:href="@{/admin/assessment/summary}" class="back-btn">← Back to Summary</a>
        
        <!-- Page Header -->
        <div class="page-header">
            <h1>All Assessment Records</h1>
            <p>Complete list of all mental health assessments</p>
        </div>
        
        <!-- Assessment Table -->
        <table class="assessment-table">
            <thead>
                <tr>
                    <th>Assessment ID</th>
                    <th>User ID</th>
                    <th>Score</th>
                    <th>Severity</th>
                    <th>Result</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="assessment : ${assessments}">
                    <td th:text="${assessment.assessmentId}">#001</td>
                    <td th:text="${assessment.userId}">1</td>
                    <td>
                        <span class="score-badge" th:text="${assessment.totalScore} + '/20'">8/20</span>
                    </td>
                    <td>
                        <span class="severity-badge" 
                              th:classappend="${assessment.severityLevel}"
                              th:text="${#strings.capitalize(assessment.severityLevel)}">
                            Mild
                        </span>
                    </td>
                    <td th:text="${assessment.assessmentResult}">Mild symptoms detected</td>
                    <td th:text="${#temporals.format(assessment.assessmentDate, 'MMM dd, yyyy hh:mm a')}">
                        Dec 15, 2024 02:30 PM
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
    
    <style>
        .back-btn {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .assessment-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .assessment-table thead {
            background: #f5f5f7;
        }
        
        .assessment-table th,
        .assessment-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #e5e5e7;
        }
        
        .assessment-table th {
            font-weight: 600;
            font-size: 14px;
            color: #666;
        }
        
        .score-badge {
            background: #e8eaed;
            padding: 4px 12px;
            border-radius: 16px;
            font-weight: 600;
        }
        
        .severity-badge {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .severity-badge.minimal {
            background: #d1f4dd;
            color: #0f7333;
        }
        
        .severity-badge.mild {
            background: #fff4ce;
            color: #b86e00;
        }
        
        .severity-badge.moderate {
            background: #ffd6cc;
            color: #c7341e;
        }
        
        .severity-badge.severe {
            background: #fdd;
            color: #a50e0e;
        }
    </style>
</body>
</html>
