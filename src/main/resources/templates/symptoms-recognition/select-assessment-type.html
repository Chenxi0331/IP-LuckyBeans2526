<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Assessment Type - Innerly</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .assessment-type-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .assessment-type-card:hover {
            border-color: #6366f1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
            transform: translateY(-2px);
        }
        .assessment-type-card h3 {
            color: #1f2937;
            margin-bottom: 8px;
        }
        .assessment-type-card p {
            color: #6b7280;
            margin-bottom: 12px;
        }
        .assessment-meta {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
            color: #9ca3af;
        }
        .start-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 12px;
        }
        .start-btn:hover {
            background: #4f46e5;
        }
    </style>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <main id="page-content-wrapper" class="main-content" style="margin-left: 260px; padding: 2rem;">
    <div class="container" style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
        <h1 style="text-align: center; margin-bottom: 12px;">Choose Your Assessment</h1>
        <p style="text-align: center; color: #6b7280; margin-bottom: 40px;">
            Select a mental health assessment tool to begin your evaluation
        </p>

        <div th:if="${assessmentTypes.isEmpty()}">
            <p style="text-align: center; color: #ef4444;">
                No assessment types available at the moment. Please contact your counselor.
            </p>
        </div>

        <div th:each="type : ${assessmentTypes}">
            <div class="assessment-type-card">
                <h3 th:text="${type.typeName}">PHQ-9</h3>
                <p th:text="${type.description}">Depression assessment tool</p>
                
                <div class="assessment-meta">
                    <span>📝 <span th:text="${type.totalQuestions}">9</span> questions</span>
                    <span>⏱️ ~<span th:text="${type.totalQuestions * 20 / 60}">3</span> minutes</span>
                    <span>📊 Max score: <span th:text="${type.maxScore}">27</span></span>
                </div>
                
                <form th:action="@{/symptoms/start}" method="get" style="margin: 0;">
                    <input type="hidden" name="assessmentTypeId" th:value="${type.typeId}">
                    <button type="submit" class="start-btn">Start Assessment →</button>
                </form>
            </div>
        </div>

        <div style="text-align: center; margin-top:40px;">
        <a th:href="@{/symptoms/dashboard}" style="color: #6366f1; text-decoration: none;"> ← Go to Dashboard
        </a>
        </div>
        </div>
    </main>
</body>
</html>
