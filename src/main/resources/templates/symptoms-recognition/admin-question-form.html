<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${question.questionId != null ? 'Edit Question' : 'Add Question'} + ' - Innerly Admin'"></title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <main id="page-content-wrapper" class="main-content" style="margin-left: 260px; padding: 2rem;">
        
        <!-- Back Button -->
        <a th:href="@{/admin/assessment/questions}" class="back-btn">
            <i class="bi bi-arrow-left"></i> Back to Questions
        </a>
        
        <!-- Page Header -->
        <div class="page-header">
            <h1 th:text="${question.questionId != null ? 'Edit Question' : 'Add New Question'}"></h1>
            <p>Create or modify an assessment question with 4 response options</p>
        </div>
        
        <!-- Question Form -->
        <div class="form-container">
            <form th:action="${question.questionId != null ? 
                            '/admin/assessment/questions/edit/' + question.questionId : 
                            '/admin/assessment/questions/add'}" 
                  method="post" 
                  th:object="${question}">
                
                <!-- Question Text -->
                <div class="form-group">
                    <label for="questionText" class="form-label">
                        Question Text <span class="required">*</span>
                    </label>
                    <textarea id="questionText" 
                             th:field="*{questionText}" 
                             class="form-control" 
                             rows="3" 
                             required
                             placeholder="e.g., In the past two weeks, how often have you experienced feelings of sadness or hopelessness?"></textarea>
                    <small class="form-text">Ask a clear, specific question about mental health symptoms.</small>
                </div>
                
                <!-- Response Options -->
                <div class="form-group">
                    <label class="form-label">
                        Response Options <span class="required">*</span>
                    </label>
                    <small class="form-text" style="display: block; margin-bottom: 12px;">
                        Provide 4 options in order of increasing severity (scored 0-3).
                    </small>
                    
                    <div class="options-container">
                        <!-- Option 0 -->
                        <div class="option-input-group">
                            <span class="option-score">Score 0</span>
                            <input type="text" 
                                   name="optionTexts" 
                                   class="form-control" 
                                   th:value="${question.options != null && question.options.size() > 0 ? question.options[0].optionText : 'Not at all'}" 
                                   placeholder="e.g., Not at all" 
                                   required>
                        </div>
                        
                        <!-- Option 1 -->
                        <div class="option-input-group">
                            <span class="option-score">Score 1</span>
                            <input type="text" 
                                   name="optionTexts" 
                                   class="form-control" 
                                   th:value="${question.options != null && question.options.size() > 1 ? question.options[1].optionText : 'Several days'}" 
                                   placeholder="e.g., Several days" 
                                   required>
                        </div>
                        
                        <!-- Option 2 -->
                        <div class="option-input-group">
                            <span class="option-score">Score 2</span>
                            <input type="text" 
                                   name="optionTexts" 
                                   class="form-control" 
                                   th:value="${question.options != null && question.options.size() > 2 ? question.options[2].optionText : 'More than half the days'}" 
                                   placeholder="e.g., More than half the days" 
                                   required>
                        </div>
                        
                        <!-- Option 3 -->
                        <div class="option-input-group">
                            <span class="option-score">Score 3</span>
                            <input type="text" 
                                   name="optionTexts" 
                                   class="form-control" 
                                   th:value="${question.options != null && question.options.size() > 3 ? question.options[3].optionText : 'Nearly every day'}" 
                                   placeholder="e.g., Nearly every day" 
                                   required>
                        </div>
                    </div>
                </div>
                
                <!-- Form Actions -->
                <div class="form-actions">
                    <a th:href="@{/admin/assessment/questions}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i>
                        <span th:text="${question.questionId != null ? 'Update Question' : 'Create Question'}"></span>
                    </button>
                </div>
            </form>
        </div>
    </main>
    
    <style>
        .back-btn {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .back-btn:hover {
            color: #7c3aed;
        }
        
        .page-header {
            margin-bottom: 32px;
        }
        
        .form-container {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 800px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }
        
        .required {
            color: #dc3545;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        
        .form-text {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }
        
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option-input-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .option-score {
            background: #f5f5f7;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            color: #666;
            min-width: 80px;
            text-align: center;
        }
        
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e5e5e7;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary {
            background: #8b5cf6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #7c3aed;
        }
        
        .btn-secondary {
            background: #f5f5f7;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e5e5e7;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
