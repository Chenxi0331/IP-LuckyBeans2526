<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Summary - Innerly Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <main id="page-content-wrapper" class="main-content" style="margin-left: 260px; padding: 2rem;">
        
        <div class="page-header">
            <h1>Assessment Statistics</h1>
            <p>Overall mental health assessment summary</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card total">
                <div class="stat-icon">📊</div>
                <h3>Total Assessments</h3>
                <div class="stat-value" th:text="${statistics.totalAssessments}">156</div>
            </div>
            
            <div class="stat-card minimal">
                <div class="stat-icon">✅</div>
                <h3>Minimal</h3>
                <div class="stat-value" th:text="${statistics.minimalCount}">45</div>
                <div class="stat-percentage" th:text="${statistics.minimalPercentage} + '%'">29%</div>
            </div>
            
            <div class="stat-card mild">
                <div class="stat-icon">⚠️</div>
                <h3>Mild</h3>
                <div class="stat-value" th:text="${statistics.mildCount}">67</div>
                <div class="stat-percentage" th:text="${statistics.mildPercentage} + '%'">43%</div>
            </div>
            
            <div class="stat-card moderate">
                <div class="stat-icon">🔸</div>
                <h3>Moderate</h3>
                <div class="stat-value" th:text="${statistics.moderateCount}">32</div>
                <div class="stat-percentage" th:text="${statistics.moderatePercentage} + '%'">21%</div>
            </div>
            
            <div class="stat-card severe">
                <div class="stat-icon">🚨</div>
                <h3>Severe</h3>
                <div class="stat-value" th:text="${statistics.severeCount}">12</div>
                <div class="stat-percentage" th:text="${statistics.severePercentage} + '%'">7%</div>
            </div>
        </div>
        
        <div class="admin-actions">
            <a th:href="@{/admin/assessment/all}" class="btn btn-primary">
                <i class="bi bi-file-text"></i> View All Assessments
            </a>
            <a th:href="@{/admin/assessment/questions}" class="btn btn-secondary">
                <i class="bi bi-pencil-square"></i> Manage Questions
            </a>
        </div>
    </main>
    
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .stat-percentage {
            font-size: 18px;
            font-weight: 600;
            opacity: 0.7;
        }
        
        .stat-card.total { border-top: 4px solid #8b5cf6; }
        .stat-card.minimal { border-top: 4px solid #0f7333; }
        .stat-card.mild { border-top: 4px solid #b86e00; }
        .stat-card.moderate { border-top: 4px solid #c7341e; }
        .stat-card.severe { border-top: 4px solid #a50e0e; }
        
        .admin-actions {
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        
        .btn-primary {
            background: #8b5cf6;
            color: white;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:hover {
            background: #7c3aed;
        }
        
        .btn-secondary {
            background: #f5f5f7;
            color: #333;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-secondary:hover {
            background: #e5e5e7;
        }
    </style>
</body>
</html>
