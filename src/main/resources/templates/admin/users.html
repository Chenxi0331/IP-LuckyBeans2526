<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Innerly | Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="page-content-wrapper" class="main-content" style="margin-left: 260px;">
        <div class="container-fluid p-4">
            <h2 class="mb-4 fw-bold">Manage Users</h2>

            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}">1</td>
                                <td th:text="${user.email}">user@example.com</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${user.role.name() == 'ADMIN'} ? 'bg-dark' : (${user.role.name() == 'COUNSELOR'} ? 'bg-success' : 'bg-primary')"
                                        th:text="${user.role}">ROLE</span>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-outline-secondary"><i class="material-icons"
                                            style="font-size: 16px;">edit</i></button>
                                    <button class="btn btn-sm btn-outline-danger"><i class="material-icons"
                                            style="font-size: 16px;">delete</i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
