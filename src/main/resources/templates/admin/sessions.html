<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Innerly | All Sessions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="page-content-wrapper" class="main-content" style="margin-left: 260px;">
        <div class="container-fluid p-4">
            <h2 class="mb-4 fw-bold">All Counselling Sessions</h2>

            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Student ID</th>
                                <th>Counsellor ID</th>
                                <th>Date & Time</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${sessions}">
                                <td th:text="${s.id}">#</td>
                                <td th:text="${s.studentId}">Student</td>
                                <td th:text="${s.counsellorId}">Counsellor</td>
                                <td th:text="${#temporals.format(s.sessionDate, 'yyyy-MM-dd HH:mm')}">Date</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${s.status == 'APPROVED'} ? 'bg-success' : (${s.status == 'PENDING'} ? 'bg-warning text-dark' : 'bg-secondary')"
                                        th:text="${s.status}">STATUS</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(sessions)}">
                                <td colspan="5" class="text-center text-muted py-4">No sessions found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
