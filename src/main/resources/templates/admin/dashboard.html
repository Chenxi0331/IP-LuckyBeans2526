<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Innerly | Admin Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="page-content-wrapper" class="main-content" style="margin-left: 260px;">
        <div class="container-fluid p-4">
            <h2 class="mb-4 fw-bold">Admin Dashboard</h2>

            <div class="row g-4">
                <!-- Card 1: Users -->
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body p-4 d-flex align-items-center gap-3">
                            <span class="material-icons text-primary" style="font-size: 48px;">people</span>
                            <div>
                                <h5 class="card-title fw-bold mb-1">Users</h5>
                                <h3 class="fw-bold mb-0" th:text="${totalUsers}">0</h3>
                                <p class="text-muted mb-0 small">Registered</p>
                                <a th:href="@{/admin/users}" class="stretched-link"></a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Card 2: Sessions -->
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body p-4 d-flex align-items-center gap-3">
                            <span class="material-icons text-success" style="font-size: 48px;">event_note</span>
                            <div>
                                <h5 class="card-title fw-bold mb-1">Sessions</h5>
                                <h3 class="fw-bold mb-0" th:text="${totalSessions}">0</h3>
                                <p class="text-muted mb-0 small">Total Sessions</p>
                                <a th:href="@{/counselling/all-sessions}" class="stretched-link"></a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Card 3: Assessments -->
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body p-4 d-flex align-items-center gap-3">
                            <span class="material-icons text-warning" style="font-size: 48px;">analytics</span>
                            <div>
                                <h5 class="card-title fw-bold mb-1">Assessments</h5>
                                <h3 class="fw-bold mb-0" th:text="${totalAssessments}">0</h3>
                                <p class="text-muted mb-0 small">Completed</p>
                                <a th:href="@{/admin/assessment}" class="stretched-link"></a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Card 4: Chats -->
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body p-4 d-flex align-items-center gap-3">
                            <span class="material-icons text-info" style="font-size: 48px;">chat</span>
                            <div>
                                <h5 class="card-title fw-bold mb-1">Chats</h5>
                                <h3 class="fw-bold mb-0" th:text="${totalChats}">0</h3>
                                <p class="text-muted mb-0 small">Active Conversations</p>
                                <!-- No direct link for all chats right now, maybe just reports or forum -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
