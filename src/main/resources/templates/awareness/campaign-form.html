<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Innerly | Campaign Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        body {
            background-color: #f8f9fa;
        }

        .card {
            border-radius: 1rem;
            border: none;
        }

        #page-content-wrapper {
            margin-left: 260px !important;
        }

        .form-section-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="page-content-wrapper" class="py-5">
        <div class="container" style="max-width: 900px;">
            <div class="mb-4">
                <a href="/awareness/manage" class="text-decoration-none text-muted">
                    <i class="fas fa-arrow-left me-2"></i> Back to Management
                </a>
            </div>

            <div class="card shadow-sm p-4 p-md-5">
                <h2 class="fw-bold mb-4 text-center">Configure Awareness Campaign</h2>

                <form th:action="@{/awareness/campaign/save}" th:object="${campaign}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <!-- BASIC INFO -->
                    <div class="form-section-title mt-2">1. Basic Information</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-8">
                            <label class="form-label">Campaign Title</label>
                            <input type="text" th:field="*{title}" class="form-control px-3"
                                placeholder="e.g., Mental Health Awareness Week" required />
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Category</label>
                            <select th:field="*{category}" class="form-select px-3">
                                <option value="Mental Health Month">Mental Health Month</option>
                                <option value="Stress Awareness">Stress Awareness</option>
                                <option value="Suicide Prevention">Suicide Prevention</option>
                                <option value="Self-Care Week">Self-Care Week</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Campaign Type</label>
                            <select th:field="*{campaignType}" class="form-select px-3">
                                <option value="Talk / Seminar">Talk / Seminar</option>
                                <option value="Workshop">Workshop</option>
                                <option value="Booth / Roadshow">Booth / Roadshow</option>
                                <option value="Online Webinar">Online Webinar</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Objective</label>
                            <textarea th:field="*{objective}" class="form-control px-3" rows="2"
                                placeholder="What is the main goal of this campaign?"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Short Description</label>
                            <textarea th:field="*{description}" class="form-control px-3" rows="3"
                                placeholder="Brief overview for the landing page..." required></textarea>
                        </div>
                    </div>

                    <!-- SCHEDULE -->
                    <div class="form-section-title">2. Date & Time</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Start Date</label>
                            <input type="date" th:field="*{startDate}" class="form-control px-3" required />
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">End Date</label>
                            <input type="date" th:field="*{endDate}" class="form-control px-3" required />
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Time / Duration</label>
                            <input type="text" th:field="*{time}" class="form-control px-3"
                                placeholder="e.g., 2:00 PM - 4:00 PM" />
                        </div>
                    </div>

                    <!-- LOCATION -->
                    <div class="form-section-title">3. Location / Platform</div>
                    <div class="mb-4">
                        <div class="d-flex gap-4 mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="locationType" id="locPhysical"
                                    value="Physical" th:field="*{locationType}"
                                    onclick="toggleLocationFields('Physical')" checked>
                                <label class="form-check-label" for="locPhysical">Physical Event</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="locationType" id="locOnline"
                                    value="Online" th:field="*{locationType}" onclick="toggleLocationFields('Online')">
                                <label class="form-check-label" for="locOnline">Online Event</label>
                            </div>
                        </div>

                        <!-- Physical Fields -->
                        <div id="physicalFields" class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Building Name</label>
                                <input type="text" th:field="*{physicalBuilding}" class="form-control px-3"
                                    placeholder="e.g., Block A, Main Library" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Room / Hall</label>
                                <input type="text" th:field="*{physicalRoom}" class="form-control px-3"
                                    placeholder="e.g., Seminar Room 2" />
                            </div>
                            <div class="col-12">
                                <label class="form-label">Campus Location</label>
                                <input type="text" th:field="*{physicalCampus}" class="form-control px-3"
                                    placeholder="e.g., Johor Bahru Campus" />
                            </div>
                        </div>

                        <!-- Online Fields -->
                        <div id="onlineFields" class="row g-3 d-none">
                            <div class="col-md-6">
                                <label class="form-label">Online Platform</label>
                                <input type="text" th:field="*{onlinePlatform}" class="form-control px-3"
                                    placeholder="e.g., Zoom, Google Meet" />
                            </div>
                            <div class="col-12">
                                <label class="form-label">Webinar / Meeting Link</label>
                                <input type="url" th:field="*{onlineLink}" class="form-control px-3"
                                    placeholder="https://..." />
                            </div>
                        </div>
                    </div>

                    <!-- HOST & REGISTRATION -->
                    <div class="form-section-title">4. Organization & Registration</div>
                    <div class="row g-3 mb-5">
                        <div class="col-md-6">
                            <label class="form-label">Organizer / Host</label>
                            <input type="text" th:field="*{organizer}" class="form-control px-3"
                                placeholder="e.g., Counseling Center" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Contact Information</label>
                            <input type="text" th:field="*{contactInfo}" class="form-control px-3"
                                placeholder="e.g., counselor@university.edu" />
                        </div>
                        <div class="col-12">
                            <label class="form-label">Registration / Participation Info</label>
                            <textarea th:field="*{registrationInfo}" class="form-control px-3" rows="3"
                                placeholder="How can students join or register? Any prerequisites?"></textarea>
                        </div>
                    </div>

                    <div class="d-grid gap-3 d-md-flex justify-content-md-end pt-4 border-top">
                        <a href="/awareness/manage"
                            class="btn btn-light px-5 py-2 rounded-pill fw-bold text-muted">Cancel</a>
                        <button type="submit" class="btn btn-primary px-5 py-2 rounded-pill fw-bold shadow-sm">
                            <i class="fas fa-paper-plane me-2"></i> Submit for Approval
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        function toggleLocationFields(type) {
            const physical = document.getElementById('physicalFields');
            const online = document.getElementById('onlineFields');

            if (type === 'Physical') {
                physical.classList.remove('d-none');
                online.classList.add('d-none');
            } else {
                physical.classList.add('d-none');
                online.classList.remove('d-none');
            }
        }

        // Initialize based on existing value (for edits)
        window.onload = function () {
            const currentType = document.querySelector('input[name="locationType"]:checked')?.value || 'Physical';
            toggleLocationFields(currentType);
        };
    </script>
</body>

</html>
