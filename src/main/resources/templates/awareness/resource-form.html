<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Innerly | Resource Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="page-content-wrapper" class="container py-5" style="margin-left: 260px;">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow p-4">
                    <h3 class="mb-4 text-center">Reference Resource</h3>

                    <form th:action="@{/awareness/resource/save}" th:object="${resource}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" th:field="*{title}" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select th:field="*{category}" class="form-select">
                                <option value="Anxiety">Anxiety</option>
                                <option value="Depression">Depression</option>
                                <option value="Stress">Stress</option>
                                <option value="Mindfulness">Mindfulness</option>
                                <option value="Sleep">Sleep</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Type</label>
                            <select th:field="*{type}" class="form-select">
                                <option value="Article">Article</option>
                                <option value="Video">Video</option>
                                <option value="Podcast">Podcast</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">External URL</label>
                            <input type="url" th:field="*{url}" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description (Short Summary)</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Save Resource</button>
                            <a href="/awareness/manage" class="btn btn-light">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
