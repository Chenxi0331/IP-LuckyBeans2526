<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Innerly | Manage Resources</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root {
            --innerly-primary: #8e2de2;
            --innerly-secondary: #4a00e0;
        }

        body {
            background-color: #f8f9fa;
        }

        .sidebar {
            height: 100vh;
            background: linear-gradient(135deg, var(--innerly-primary), var(--innerly-secondary));
            color: white;
        }
    </style>
</head>

<body>
    <div class="d-flex">
        <!-- Sidebar Placeholder (in real app, use fragment) -->
        <div class="sidebar p-4" style="width: 280px;">
            <h3>Innerly Admin</h3>
            <hr>
            <a href="/awareness/manage" class="text-white text-decoration-none fw-bold"><i class="fas fa-book me-2"></i>
                Resources</a>
        </div>

        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Manage Educational Resources</h2>
                <a href="/awareness/resource/new" class="btn btn-primary"><i class="fas fa-plus me-2"></i> Add New
                    Resource</a>
            </div>

            <div th:if="${param.success}" class="alert alert-success">Action completed successfully!</div>

            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="res : ${resources}">
                                <td>
                                    <div class="fw-bold" th:text="${res.title}">Title</div>
                                    <small class="text-muted" th:text="${res.description}">Desc</small>
                                </td>
                                <td><span class="badge bg-info-subtle text-info"
                                        th:text="${res.category}">Category</span></td>
                                <td th:text="${res.type}">Article</td>
                                <td>
                                    <a th:href="@{/awareness/resource/edit/{id}(id=${res.id})}"
                                        class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>

                                    <form th:action="@{/awareness/resource/delete/{id}(id=${res.id})}" method="post"
                                        class="d-inline" onsubmit="return confirm('Are you sure?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"><i
                                                class="fas fa-trash"></i></button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
