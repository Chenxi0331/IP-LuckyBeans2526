<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counselor Profile - Innerly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- NAVBAR Fragment -->
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <!-- MAIN CONTENT -->
    <div id="page-content-wrapper" style="margin-left: 260px; min-height: 100vh; background-color: #f8fafc;">
        <div class="container-fluid p-4">
            <div class="header mb-4">
                <h2 class="fw-bold" style="color: #a855f7;">Counselor Profile</h2>
                <p class="text-muted">Manage your counselor profile information</p>
            </div>
            
            <!-- Success/Error Messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            
            <div class="row">
                <!-- Profile Card -->
                <div class="col-md-4 mb-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center p-4">
                            <div class="mb-3">
                                <div style="width: 100px; height: 100px; background: linear-gradient(135deg, #a855f7, #9333ea); 
                                           border-radius: 50%; display: flex; align-items: center; justify-content: center; 
                                           color: white; font-size: 40px; font-weight: 700; margin: 0 auto;">
                                    <span th:text="${user.initial != null ? user.initial : '👤'}">JS</span>
                                </div>
                            </div>
                            <h4 class="fw-bold mb-1" th:text="${user.fullName}">Dr. Jane Smith</h4>
                            <span class="badge" style="background: #a855f7; color: white;">Professional Counselor</span>
                            <p class="text-muted small mt-3 mb-2">
                                <strong>Email:</strong> <span th:text="${user.email}">jane@example.com</span>
                            </p>
                            <p class="text-muted small mb-2">
                                <strong>Username:</strong> <span th:text="${user.username != null ? user.username : 'Not set'}">drjane</span>
                            </p>
                            <p class="text-muted small">
                                <strong>Member since:</strong> <span th:text="${#temporals.format(user.createdAt, 'MMM dd, yyyy')}">Jan 15, 2024</span>
                            </p>
                            <hr>
                            <a th:href="@{/counselor-chat/my-chats}" class="btn btn-sm" style="background: #a855f7; color: white; width: 100%;">
                                View My Chats
                            </a>
                        </div>
                    </div>
                </div>
                
                <!-- Edit Profile Form -->
                <div class="col-md-8">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-body p-4">
                            <h5 class="card-title fw-bold mb-4">Edit Profile Information</h5>
                            <form th:action="@{/profile/edit}" method="post">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Full Name</label>
                                    <input type="text" class="form-control" name="fullName" 
                                           th:value="${user.fullName}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="email" class="form-control" th:value="${user.email}" disabled>
                                    <small class="text-muted">Email cannot be changed</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Username</label>
                                    <input type="text" class="form-control" name="username" 
                                           th:value="${user.username}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Phone Number</label>
                                    <input type="text" class="form-control" name="phone" 
                                           th:value="${user.phone}" placeholder="Enter phone number">
                                </div>
                                <button type="submit" class="btn btn-primary">Update Profile</button>
                            </form>
                        </div>
                    </div>
                    
                    <!-- Change Password -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <h5 class="card-title fw-bold mb-4">Change Password</h5>
                            <form th:action="@{/profile/change-password}" method="post">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Current Password</label>
                                    <input type="password" class="form-control" name="currentPassword" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">New Password</label>
                                    <input type="password" class="form-control" name="newPassword" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Confirm New Password</label>
                                    <input type="password" class="form-control" name="confirmPassword" required>
                                </div>
                                <button type="submit" class="btn btn-secondary">Change Password</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
