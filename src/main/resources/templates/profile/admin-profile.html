<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Innerly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- NAVBAR Fragment -->
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <!-- MAIN CONTENT -->
    <div id="page-content-wrapper" style="margin-left: 260px; min-height: 100vh; background-color: #f8fafc;">
        <div class="container-fluid p-4">
            <div class="header mb-4">
                <h2 class="fw-bold" style="color: #a855f7;">User Management</h2>
                <p class="text-muted">Manage all system users</p>
            </div>
            
            <!-- Success/Error Messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            
            <!-- Users Table -->
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Username</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u : ${users}">
                                    <td th:text="${u.id}">1</td>
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <div style="width: 32px; height: 32px; background: linear-gradient(135deg, #a855f7, #9333ea); 
                                                       border-radius: 50%; display: flex; align-items: center; justify-content: center; 
                                                       color: white; font-size: 14px; font-weight: 600;">
                                                <span th:text="${u.initial != null ? u.initial : '?'}">JS</span>
                                            </div>
                                            <span th:text="${u.fullName}">John Smith</span>
                                        </div>
                                    </td>
                                    <td th:text="${u.email}">john@example.com</td>
                                    <td>
                                        <span class="badge" 
                                              th:classappend="${u.role.name() == 'ADMIN'} ? 'bg-danger' : (${u.role.name() == 'COUNSELOR'} ? 'bg-info' : 'bg-primary')"
                                              th:text="${u.role}">STUDENT</span>
                                    </td>
                                    <td th:text="${u.username != null ? u.username : '-'}">john123</td>
                                    <td>
                                        <span class="badge" 
                                              th:classappend="${u.active} ? 'bg-success' : 'bg-secondary'"
                                              th:text="${u.active ? 'Active' : 'Inactive'}">Active</span>
                                    </td>
                                    <td th:text="${#temporals.format(u.createdAt, 'MMM dd, yyyy')}">Jan 15, 2024</td>
                                    <td>
                                        <form th:action="@{/admin/users/{id}/toggle-active(id=${u.id})}" 
                                              method="post" style="display: inline;">
                                            <button type="submit" class="btn btn-sm" 
                                                    th:classappend="${u.active} ? 'btn-warning' : 'btn-success'"
                                                    th:text="${u.active ? 'Deactivate' : 'Activate'}">
                                                Toggle
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
