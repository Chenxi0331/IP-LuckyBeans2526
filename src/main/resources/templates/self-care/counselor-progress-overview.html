<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Progress Overview - Innerly</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <main id="page-content-wrapper" class="main-content" style="margin-left: 260px; padding: 2rem;">
        
        <!-- Page Header -->
        <div class="page-header">
            <h1>Student Self-Care Progress Overview</h1>
            <p>Track student progress in self-care modules</p>
        </div>
        
        <!-- Progress Table -->
        <div class="progress-table-section">
            <table class="progress-table">
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Email</th>
                        <th>Completed Modules</th>
                        <th>In Progress</th>
                        <th>Average Progress</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="summary : ${studentProgressList}">
                        <td th:text="${summary.studentName}">John Smith</td>
                        <td th:text="${summary.studentEmail}">john@example.com</td>
                        <td>
                            <span class="count-badge" 
                                  th:text="${summary.completedModules} + '/' + ${summary.totalModules}">
                                2/5
                            </span>
                        </td>
                        <td>
                            <span class="count-badge inprogress" 
                                  th:text="${summary.inProgressCount}">
                                1
                            </span>
                        </td>
                        <td>
                            <div class="progress-bar-small">
                                <div class="progress-fill-small" 
                                     th:style="'width: ' + ${summary.averageProgress} + '%'">
                                </div>
                            </div>
                            <span th:text="${summary.averageProgress} + '%'">48%</span>
                        </td>
                        <td>
                            <a th:href="@{/counselor/progress/student/{id}(id=${summary.studentId})}" 
                               class="btn btn-primary">
                                View Details
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    
    <style>
        .progress-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .progress-table thead {
            background: #f5f5f7;
        }
        
        .progress-table th,
        .progress-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #e5e5e7;
        }
        
        .progress-table th {
            font-weight: 600;
            font-size: 14px;
            color: #666;
        }
        
        .count-badge {
            background: #e8eaed;
            padding: 4px 12px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
        }
        
        .count-badge.inprogress {
            background: #fff4ce;
            color: #b86e00;
        }
        
        .progress-bar-small {
            background: #e0e0e0;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            width: 100px;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        .progress-fill-small {
            background: linear-gradient(90deg, #8b5cf6, #a78bfa);
            height: 100%;
        }
        
        .btn-primary {
            background: #8b5cf6;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
        }
        
        .btn-primary:hover {
            background: #7c3aed;
        }
    </style>
</body>
</html>
