<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz Results</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="result-overlay">
        <div class="result-container">
            
            <div class="result-header">
                <div class="score-circle" th:classappend="${correctCount >= totalQuestions * 0.7} ? 'pass' : 'needs-improvement'">
                    <div class="score-number" th:text="${correctCount}">0</div>
                    <div class="score-total">/ <span th:text="${totalQuestions}">0</span></div>
                </div>
                
                <h1>Quiz Results</h1>
                <p class="score-percentage">
                    You scored <strong th:text="${#numbers.formatDecimal((correctCount * 100.0 / totalQuestions), 1, 1)} + '%'">0%</strong>
                </p>
                
                <div th:if="${correctCount >= totalQuestions * 0.7}" class="result-message success">
                    <i class="bi bi-check-circle"></i>
                    Great job! You've successfully completed this module.
                </div>
                
                <div th:if="${correctCount < totalQuestions * 0.7}" class="result-message needs-work">
                    <i class="bi bi-exclamation-circle"></i>
                    Good effort! You might want to review the material again.
                </div>
            </div>
            
            <div class="answers-review">
                <h2>Review Your Answers</h2>
                
                <div class="answer-card" th:each="quiz, iterStat : ${quizzes}">
                    <div class="answer-header">
                        <span class="question-number">Question <span th:text="${iterStat.index + 1}"></span></span>
                        <span class="answer-status" 
                              th:if="${userAnswers.get(quiz.quizId)}"
                              th:classappend="${userAnswers.get(quiz.quizId).isCorrect} ? 'correct' : 'incorrect'">
                            <i th:class="${userAnswers.get(quiz.quizId).isCorrect} ? 'bi bi-check-circle' : 'bi bi-x-circle'"></i>
                            <span th:text="${userAnswers.get(quiz.quizId).isCorrect} ? 'Correct' : 'Incorrect'"></span>
                        </span>
                    </div>
                    
                    <div class="question-text" th:text="${quiz.questionText}">
                        Question text
                    </div>
                    
                    <div class="answer-options">
                        <div class="answer-option" 
                             th:each="option : ${options}"
                             th:class="'answer-option' + (${option == quiz.correctAnswer} ? ' correct-answer' : '') + 
                                        (${userAnswers.get(quiz.quizId) != null and option == userAnswers.get(quiz.quizId).selectedAnswer and option != quiz.correctAnswer} ? ' your-wrong-answer' : '')">
                            
                            <div class="option-indicator">
                                <i th:if="${option == quiz.correctAnswer}" class="bi bi-check-circle-fill"></i>
                                <i th:if="${userAnswers.get(quiz.quizId) != null 
                                           and option == userAnswers.get(quiz.quizId).selectedAnswer 
                                           and option != quiz.correctAnswer}" 
                                   class="bi bi-x-circle-fill"></i>
                                <strong th:text="${option} + '.'"></strong>
                            </div>
                            
                            <span class="option-text">
                                <span th:if="${option == 'A'}" th:text="${quiz.optionA}"></span>
                                <span th:if="${option == 'B'}" th:text="${quiz.optionB}"></span>
                                <span th:if="${option == 'C'}" th:text="${quiz.optionC}"></span>
                                <span th:if="${option == 'D'}" th:text="${quiz.optionD}"></span>
                            </span>
                            
                            <span th:if="${option == quiz.correctAnswer}" class="label-correct">
                                Correct Answer
                            </span>
                            
                            <span th:if="${userAnswers.get(quiz.quizId) != null 
                                         and option == userAnswers.get(quiz.quizId).selectedAnswer 
                                         and option != quiz.correctAnswer}" 
                                  class="label-your">
                                Your Answer
                            </span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="result-actions">
                <a th:href="@{/self-care}" class="btn btn-primary">
                    Back to Self-Care
                </a>
                <a th:href="@{/self-care/module/{id}(id=${moduleId})}" class="btn btn-secondary">
                    Back to Module
                </a>
            </div>
            
        </div>
    </div>
    
    <style>
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        
        .result-container {
            background: white;
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            padding: 40px;
            margin: auto;
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            border: 6px solid #e0e0e0;
        }
        
        .score-circle.pass {
            border-color: #10b981;
            background: #d1fae5;
        }
        
        .score-circle.needs-improvement {
            border-color: #f59e0b;
            background: #fef3c7;
        }
        
        .score-number {
            font-size: 48px;
            font-weight: 700;
            color: #1d1d1f;
        }
        
        .score-total {
            font-size: 20px;
            color: #666;
        }
        
        .result-header h1 {
            font-size: 28px;
            margin: 16px 0;
        }
        
        .score-percentage {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .score-percentage strong {
            color: #8b5cf6;
            font-size: 24px;
        }
        
        .result-message {
            padding: 16px 24px;
            border-radius: 8px;
            display: inline-block;
            font-weight: 600;
            margin-top: 12px;
        }
        
        .result-message i {
            margin-right: 8px;
            font-size: 20px;
        }
        
        .result-message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .result-message.needs-work {
            background: #fef3c7;
            color: #92400e;
        }
        
        .answers-review {
            margin-bottom: 32px;
        }
        
        .answers-review h2 {
            font-size: 22px;
            margin-bottom: 24px;
            color: #1d1d1f;
        }
        
        .answer-card {
            background: #f9f9f9;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px solid #e5e5e7;
        }
        
        .answer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .question-number {
            font-size: 14px;
            color: #8b5cf6;
            font-weight: 600;
        }
        
        .answer-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 16px;
        }
        
        .answer-status.correct {
            background: #d1fae5;
            color: #065f46;
        }
        
        .answer-status.incorrect {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #1d1d1f;
        }
        
        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .answer-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: white;
            border: 2px solid #e5e5e7;
            border-radius: 8px;
        }
        
        .answer-option.correct-answer {
            border-color: #10b981;
            background: #d1fae5;
        }
        
        .answer-option.your-wrong-answer {
            border-color: #ef4444;
            background: #fee2e2;
        }
        
        .option-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 40px;
        }
        
        .option-indicator i {
            font-size: 18px;
        }
        
        .correct-answer .option-indicator i {
            color: #10b981;
        }
        
        .your-wrong-answer .option-indicator i {
            color: #ef4444;
        }
        
        .option-text {
            flex: 1;
            line-height: 1.5;
        }
        
        .label-correct, .label-your {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
        }
        
        .label-correct {
            background: #10b981;
            color: white;
        }
        
        .label-your {
            background: #ef4444;
            color: white;
        }
        
        .result-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .btn {
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }
        
        .btn-primary {
            background: #8b5cf6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #7c3aed;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
    </style>
</body>
</html>
