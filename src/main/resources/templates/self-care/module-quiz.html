<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Module Quiz</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="quiz-overlay">
        <div class="quiz-container">
            
            <div class="quiz-header">
                <a th:href="@{/self-care/module/{id}(id=${moduleId})}" class="back-button">← Back to Module</a>
                <h1>📝 Module Quiz</h1>
                <p>Complete this quiz to finish the module (50% remaining)</p>
            </div>
            
            <div th:if="${alreadyCompleted}" class="alert alert-info">
                <strong>✓ Quiz Already Completed!</strong>
                <p>You've already completed this quiz. Click below to view your results.</p>
                <a th:href="@{/self-care/module/{id}/quiz/result(id=${moduleId})}" 
                   class="btn btn-primary">
                    View Results
                </a>
            </div>
            
            <form th:if="${!alreadyCompleted}" 
                  th:action="@{/self-care/module/{id}/quiz/submit(id=${moduleId})}" 
                  method="post" 
                  id="quizForm">
                
                <div class="quiz-questions">
                    <div class="question-card" th:each="quiz, iterStat : ${quizzes}">
                        <div class="question-number">
                            Question <span th:text="${iterStat.index + 1}"></span> of <span th:text="${quizzes.size()}"></span>
                        </div>
                        
                        <div class="question-text" th:text="${quiz.questionText}">
                            Question text here
                        </div>
                        
                        <div class="options">
                            <label class="option-label">
                                <input type="radio" 
                                       th:name="'question_' + ${quiz.quizId}" 
                                       value="A" 
                                       required>
                                <span class="option-text">
                                    <strong>A.</strong> <span th:text="${quiz.optionA}"></span>
                                </span>
                            </label>
                            
                            <label class="option-label">
                                <input type="radio" 
                                       th:name="'question_' + ${quiz.quizId}" 
                                       value="B" 
                                       required>
                                <span class="option-text">
                                    <strong>B.</strong> <span th:text="${quiz.optionB}"></span>
                                </span>
                            </label>
                            
                            <label class="option-label">
                                <input type="radio" 
                                       th:name="'question_' + ${quiz.quizId}" 
                                       value="C" 
                                       required>
                                <span class="option-text">
                                    <strong>C.</strong> <span th:text="${quiz.optionC}"></span>
                                </span>
                            </label>
                            
                            <label class="option-label">
                                <input type="radio" 
                                       th:name="'question_' + ${quiz.quizId}" 
                                       value="D" 
                                       required>
                                <span class="option-text">
                                    <strong>D.</strong> <span th:text="${quiz.optionD}"></span>
                                </span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <div class="quiz-actions">
                    <a th:href="@{/self-care/module/{id}(id=${moduleId})}" 
                       class="btn btn-secondary">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        Submit Quiz
                    </button>
                </div>
            </form>
            
        </div>
    </div>
    
    <style>
        .quiz-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        
        .quiz-container {
            background: white;
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            padding: 32px;
            margin: auto;
        }
        
        .quiz-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .quiz-header h1 {
            font-size: 28px;
            margin: 16px 0 8px 0;
            color: #1d1d1f;
        }
        
        .quiz-header p {
            color: #666;
            font-size: 16px;
        }
        
        .back-button {
            display: inline-block;
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .back-button:hover {
            color: #7c3aed;
        }
        
        .alert-info {
            background: #e0f2fe;
            border: 1px solid #3b82f6;
            color: #1e40af;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .alert-info strong {
            display: block;
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .alert-info p {
            margin: 12px 0;
        }
        
        .quiz-questions {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .question-card {
            background: #f9f9f9;
            padding: 24px;
            border-radius: 12px;
            border: 2px solid #e5e5e7;
        }
        
        .question-number {
            font-size: 14px;
            color: #8b5cf6;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option-label {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: white;
            border: 2px solid #e5e5e7;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .option-label:hover {
            border-color: #8b5cf6;
            background: #faf5ff;
        }
        
        .option-label input[type="radio"] {
            margin-top: 2px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .option-label input[type="radio"]:checked + .option-text {
            color: #8b5cf6;
            font-weight: 600;
        }
        
        .option-text {
            flex: 1;
            line-height: 1.6;
            color: #333;
        }
        
        .option-text strong {
            color: #8b5cf6;
            margin-right: 8px;
        }
        
        .quiz-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .btn {
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-primary {
            background: #8b5cf6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #7c3aed;
        }
    </style>
</body>
</html>
