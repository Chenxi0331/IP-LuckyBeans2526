<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${module.title}">Module Detail</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="module-detail-overlay">
        <div class="module-detail-modal">
            
            <!-- Header -->
            <div class="modal-header">
                <a th:href="@{/self-care}" class="back-button">← Back</a>
                <button class="close-button" onclick="window.location.href='/self-care'">✕</button>
            </div>
            
            <!-- Success/Error Messages -->
            <div th:if="${message}" class="alert" 
                 th:classappend="${messageType == 'success'} ? 'alert-success' : 'alert-danger'">
                <span th:text="${message}"></span>
            </div>
            
            <!-- Module Info -->
            <div class="module-info">
                <div class="module-icon" th:text="${module.icon}">🌙</div>
                <h1 th:text="${module.title}">Module Title</h1>
                <p th:text="${module.description}">Description</p>
                
                <div class="module-meta">
                    <span class="badge" th:text="${module.level}">Beginner</span>
                    <span class="duration" th:text="${module.duration} + ' min'">20 min</span>
                    <span class="badge content-type" th:if="${module.contentType == 'video_url'}">
                        <i class="bi bi-play-circle"></i> Video
                    </span>
                    <span class="badge content-type" th:if="${module.contentType == 'video_file'}">
                        <i class="bi bi-file-play"></i> Video File
                    </span>
                    <span class="badge content-type" th:if="${module.contentType == 'pdf'}">
                        <i class="bi bi-file-pdf"></i> PDF
                    </span>
                    <span class="badge content-type" th:if="${module.contentType == 'text'}">
                        <i class="bi bi-file-text"></i> Text
                    </span>
                </div>
            </div>
            
            <!-- Module Content Display -->
            <div class="module-content">
                <h2>Module Content</h2>
                
                <!-- Video URL -->
                <div th:if="${module.contentType == 'video_url' and module.videoUrl != null}" class="content-viewer">
                    <div class="video-container">
                        <iframe th:src="${module.videoUrl}" 
                                frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen>
                        </iframe>
                    </div>
                </div>
                
                <!-- Video File -->
                <div th:if="${module.contentType == 'video_file' and module.videoFilePath != null}" class="content-viewer">
                    <video controls class="video-player">
                        <source th:src="${module.videoFilePath}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                
                <!-- PDF File -->
                <div th:if="${module.contentType == 'pdf' and module.pdfFilePath != null}" class="content-viewer">
                    <div class="pdf-preview">
                        <i class="bi bi-file-pdf" style="font-size: 48px; color: #dc3545;"></i>
                        <p>PDF Document</p>
                        <a th:href="${module.pdfFilePath}" 
                           target="_blank" 
                           class="btn btn-outline-primary">
                            <i class="bi bi-download"></i> Download PDF
                        </a>
                    </div>
                </div>
                
                <!-- Text Content -->
                <div th:if="${module.contentType == 'text' and module.textContent != null}" class="content-viewer">
                    <div class="text-content" th:utext="${module.textContent}"></div>
                </div>
            </div>
            
            <!-- Progress Section -->
            <div class="progress-section">
                <div class="progress-header">
                    <span>Your Progress</span>
                    <span class="progress-percentage" th:text="${progress.progressPercentage} + '%'">0%</span>
                </div>
                
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" 
                         th:style="'width: ' + ${progress.progressPercentage} + '%'">
                    </div>
                </div>
                
                <div class="progress-info" style="margin-top: 12px; font-size: 14px; color: #666;">
                    <div th:if="${progress.contentCompleted}">
                        ✓ Content completed (50%)
                    </div>
                    <div th:if="${progress.quizCompleted}">
                        ✓ Quiz completed (50%)
                    </div>
                    <div th:if="${!progress.contentCompleted}">
                        ○ Content not yet completed
                    </div>
                    <div th:if="${progress.contentCompleted and !progress.quizCompleted}">
                        ○ Quiz pending
                    </div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="modal-actions">
                <a th:href="@{/self-care}" class="btn btn-secondary">Close</a>
                
                <!-- Complete Content Button (only if not completed) -->
                <button th:if="${!progress.contentCompleted}" 
                        class="btn btn-primary" 
                        onclick="completeContent()">
                    ✓ Mark Content Complete
                </button>
                
                <!-- Take Quiz Button (only if content completed but quiz not done) -->
                <a th:if="${progress.contentCompleted and !progress.quizCompleted}"
                   th:href="@{/self-care/module/{id}/quiz(id=${module.moduleId})}" 
                   class="btn btn-success">
                    📝 Take Quiz
                </a>
                
                <!-- View Results Button (if quiz completed) -->
                <a th:if="${progress.quizCompleted}"
                   th:href="@{/self-care/module/{id}/quiz/result(id=${module.moduleId})}" 
                   class="btn btn-info">
                    📊 View Quiz Results
                </a>
            </div>
            
        </div>
    </div>
    
    <script th:inline="javascript">
        const moduleId = /*[[${module.moduleId}]]*/ 0;
        
        function completeContent() {
    if (!confirm('Have you finished viewing all the content? This will mark the content as complete (50% progress).')) {
        return;
    }
    
    // Get CSRF token from meta tag or hidden input
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.content || 
                      document.querySelector('input[name="_csrf"]')?.value;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';
    
    fetch(`/self-care/module/${moduleId}/complete-content`, {
        method: 'POST',
        headers: { 
            'Content-Type': 'application/x-www-form-urlencoded',
            [csrfHeader]: csrfToken  // ADD THIS!
        }
    })
    .then(res => res.json())
    .then(result => {
        if (result.success) {
            alert('✓ Content completed! You can now take the quiz to complete this module.');
            location.reload();
        } else {
            alert('Failed: ' + result.message);
        }
    })
    .catch(err => {
        console.error(err);
        alert('An error occurred');
    });
}
    </script>
    
    <style>
        /* Previous styles remain the same, add these */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #d1f4dd;
            color: #0f7333;
            border: 1px solid #0f7333;
        }
        
        .alert-danger {
            background: #fdd;
            color: #a50e0e;
            border: 1px solid #a50e0e;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .btn-info {
            background: #3b82f6;
            color: white;
        }
        
        .btn-info:hover {
            background: #2563eb;
        }
        
        .progress-info div {
            padding: 4px 0;
        }
        
        /* All previous CSS from original module-detail.html remains */
        .module-detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .module-detail-modal {
            background: white;
            width: 90%;
            max-width: 800px;
            border-radius: 16px;
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .back-button, .close-button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #8b5cf6;
        }
        
        .module-info {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .module-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .module-info h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .module-meta {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .badge {
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 14px;
            color: #333;
        }
        
        .badge.content-type {
            background: #e0e7ff;
            color: #4f46e5;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .module-content {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        
        .content-viewer {
            margin-top: 16px;
        }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .video-player {
            width: 100%;
            max-height: 450px;
            border-radius: 8px;
            background: #000;
        }
        
        .pdf-preview {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 8px;
            border: 2px dashed #dee2e6;
        }
        
        .text-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
        }
        
        .progress-section {
            margin-bottom: 24px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .progress-bar-container {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            background: linear-gradient(90deg, #8b5cf6, #a78bfa);
            height: 100%;
            transition: width 0.3s ease;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-primary {
            background: #8b5cf6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #7c3aed;
        }
        
        .btn-outline-primary {
            border: 2px solid #8b5cf6;
            color: #8b5cf6;
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        
        .btn-outline-primary:hover {
            background: #8b5cf6;
            color: white;
        }
    </style>
</body>
</html>
