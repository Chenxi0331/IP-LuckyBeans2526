<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Quiz Questions - Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <main id="page-content-wrapper" class="main-content" style="margin-left: 260px; padding: 2rem;">
        
        <div class="page-header-actions mb-4">
            <div>
                <h1>
                    <i class="bi bi-question-circle"></i>
                    Manage Quiz Questions
                </h1>
                <p>Module: <strong th:text="${module.title}"></strong> <span th:text="${module.icon}"></span></p>
            </div>
            <a th:href="@{/admin/modules}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to Modules
            </a>
        </div>

        <div th:if="${message}" class="alert" 
             th:classappend="${messageType == 'success'} ? 'alert-success' : 'alert-danger'">
            <span th:text="${message}"></span>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-list-check"></i>
                            Existing Quiz Questions (<span th:text="${quizzes.size()}"></span>)
                        </h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${quizzes.isEmpty()}" class="alert alert-info">
                            <i class="bi bi-info-circle"></i>
                            No quiz questions yet. Add your first question below!
                        </div>

                        <div th:each="quiz, iterStat : ${quizzes}" class="quiz-item mb-3">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="mb-0">
                                    <span class="badge bg-secondary me-2" th:text="'Q' + ${iterStat.count}"></span>
                                    <span th:text="${quiz.questionText}"></span>
                                </h5>
                                <div>
                                    <span th:if="${quiz.status == 'PENDING'}" class="badge bg-warning text-dark">Pending</span>
                                    <span th:if="${quiz.status == 'APPROVED'}" class="badge bg-success">Approved</span>
                                    <span th:if="${quiz.status == 'REJECTED'}" class="badge bg-danger">Rejected</span>
                                </div>
                            </div>
                            
                            <ul class="list-unstyled mb-3">
                                <li class="mb-1">
                                    <strong>A.</strong> <span th:text="${quiz.optionA}"></span>
                                    <span th:if="${quiz.correctAnswer == 'A'}" class="badge bg-success ms-2">
                                        <i class="bi bi-check-circle"></i> Correct
                                    </span>
                                </li>
                                <li class="mb-1">
                                    <strong>B.</strong> <span th:text="${quiz.optionB}"></span>
                                    <span th:if="${quiz.correctAnswer == 'B'}" class="badge bg-success ms-2">
                                        <i class="bi bi-check-circle"></i> Correct
                                    </span>
                                </li>
                                <li class="mb-1">
                                    <strong>C.</strong> <span th:text="${quiz.optionC}"></span>
                                    <span th:if="${quiz.correctAnswer == 'C'}" class="badge bg-success ms-2">
                                        <i class="bi bi-check-circle"></i> Correct
                                    </span>
                                </li>
                                <li class="mb-1">
                                    <strong>D.</strong> <span th:text="${quiz.optionD}"></span>
                                    <span th:if="${quiz.correctAnswer == 'D'}" class="badge bg-success ms-2">
                                        <i class="bi bi-check-circle"></i> Correct
                                    </span>
                                </li>
                            </ul>
                            
                            <div class="btn-group">
                                <a th:href="@{/admin/modules/quiz/edit/{id}(id=${quiz.quizId})}" 
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i> Edit
                                </a>
                                <a th:if="${quiz.status == 'PENDING'}"
                                   th:href="@{/admin/modules/quiz/approve/{id}(id=${quiz.quizId})}" 
                                   class="btn btn-sm btn-success">
                                    <i class="bi bi-check-circle"></i> Approve
                                </a>
                                <a th:href="@{/admin/modules/quiz/delete/{id}(id=${quiz.quizId})}" 
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Delete this quiz question?')">
                                    <i class="bi bi-trash"></i> Delete
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-plus-circle"></i>
                            Add New Question
                        </h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/modules/{id}/quiz/add(id=${module.moduleId})}" 
                              method="post" 
                              th:object="${newQuiz}">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Question *</label>
                                <textarea class="form-control" 
                                          th:field="*{questionText}" 
                                          rows="3" 
                                          required></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Option A *</label>
                                <input type="text" class="form-control" th:field="*{optionA}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Option B *</label>
                                <input type="text" class="form-control" th:field="*{optionB}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Option C *</label>
                                <input type="text" class="form-control" th:field="*{optionC}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Option D *</label>
                                <input type="text" class="form-control" th:field="*{optionD}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Correct Answer *</label>
                                <select class="form-select" th:field="*{correctAnswer}" required>
                                    <option value="">-- Select --</option>
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Question Order</label>
                                <input type="number" class="form-control" th:field="*{questionOrder}" min="1" value="1">
                            </div>

                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-plus-circle"></i> Add Question
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <style>
        .page-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .quiz-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1.5rem;
            border-left: 4px solid #8b5cf6;
        }
        
        .card {
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: none;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
