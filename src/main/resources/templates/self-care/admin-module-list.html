<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Self-Care Modules - Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <main id="page-content-wrapper" class="main-content" style="margin-left: 260px; padding: 2rem;">
        
        <!-- Page Header -->
        <div class="page-header-actions">
            <div>
                <h1>Manage Self-Care Modules</h1>
                <p>Add, edit, or delete self-care modules</p>
            </div>
            <a th:href="@{/admin/modules/add}" class="btn btn-primary">
                ➕ Add New Module
            </a>
        </div>
        
        <!-- Modules Table -->
        <table class="module-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Icon</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Level</th>
                    <th>Duration</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="module : ${modules}">
                    <td th:text="${module.moduleId}">#1</td>
                    <td>
                        <span class="module-icon-small" th:text="${module.icon}">🧘</span>
                    </td>
                    <td th:text="${module.title}">Mindful Breathing</td>
                    <td th:text="${module.category}">mindfulness</td>
                    <td>
                        <span class="level-badge" th:text="${module.level}">Beginner</span>
                    </td>
                    <td th:text="${module.duration} + ' min'">10 min</td>
                    <td>
                        <span th:if="${module.isLocked}" class="status-badge locked">🔒 Locked</span>
                        <span th:unless="${module.isLocked}" class="status-badge unlocked">🔓 Unlocked</span>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <a th:href="@{/admin/modules/edit/{id}(id=${module.moduleId})}" 
                               class="btn-action btn-edit">
                                ✏️ Edit
                            </a>
                            <a th:href="@{/admin/modules/toggle-lock/{id}(id=${module.moduleId})}" 
                               class="btn-action btn-lock">
                                🔒 Toggle
                            </a>
                            <a th:href="@{/admin/modules/delete/{id}(id=${module.moduleId})}" 
                               class="btn-action btn-delete"
                               onclick="return confirm('Are you sure you want to delete this module?')">
                                🗑️ Delete
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
    
    <style>
        .page-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .btn-primary {
            background: #8b5cf6;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
        
        .module-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .module-table thead {
            background: #f5f5f7;
        }
        
        .module-table th,
        .module-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #e5e5e7;
        }
        
        .module-icon-small {
            font-size: 32px;
        }
        
        .level-badge {
            background: #e8eaed;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-badge.locked {
            background: #ffd6cc;
            color: #c7341e;
        }
        
        .status-badge.unlocked {
            background: #d1f4dd;
            color: #0f7333;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn-action {
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }
        
        .btn-edit {
            background: #fff4ce;
            color: #b86e00;
        }
        
        .btn-lock {
            background: #e8eaed;
            color: #666;
        }
        
        .btn-delete {
            background: #ffd6cc;
            color: #c7341e;
        }
    </style>
</body>
</html>
