<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Quiz - Counselor</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <main id="page-content-wrapper" class="main-content" style="margin-left: 260px; padding: 2rem;">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2">
                <!-- Sidebar -->
            </div>
            
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">
                        <i class="bi bi-question-circle"></i> Manage Quiz
                    </h1>
                    <a th:href="@{/counselor/modules}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Back to Modules
                    </a>
                </div>
                
                <!-- Module Info -->
                <div class="alert alert-info">
                    <h5>
                        <span th:text="${module.icon}"></span>
                        <span th:text="${module.title}"></span>
                    </h5>
                    <p class="mb-0" th:text="${module.description}"></p>
                </div>
                
                <!-- Success/Error Messages -->
                <div th:if="${message}" class="alert" 
                     th:classappend="${messageType == 'success'} ? 'alert-success' : 'alert-danger'">
                    <span th:text="${message}"></span>
                </div>
                
                <!-- Add New Question Form -->
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Add New Quiz Question</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/counselor/modules/{moduleId}/quiz/add(moduleId=${module.moduleId})}" 
                              method="post">
                            
                            <div class="mb-3">
                                <label for="questionText" class="form-label">Question Text *</label>
                                <textarea class="form-control" 
                                          id="questionText" 
                                          name="questionText" 
                                          rows="3" 
                                          placeholder="Enter your question here..."
                                          required></textarea>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="optionA" class="form-label">Option A *</label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="optionA" 
                                           name="optionA" 
                                           placeholder="First option"
                                           required>
                                </div>
                                <div class="col-md-6">
                                    <label for="optionB" class="form-label">Option B *</label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="optionB" 
                                           name="optionB" 
                                           placeholder="Second option"
                                           required>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="optionC" class="form-label">Option C *</label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="optionC" 
                                           name="optionC" 
                                           placeholder="Third option"
                                           required>
                                </div>
                                <div class="col-md-6">
                                    <label for="optionD" class="form-label">Option D *</label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="optionD" 
                                           name="optionD" 
                                           placeholder="Fourth option"
                                           required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="correctAnswer" class="form-label">Correct Answer *</label>
                                <select class="form-select" id="correctAnswer" name="correctAnswer" required>
                                    <option value="">Select the correct answer</option>
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-plus-circle"></i> Add Question (Pending Admin Approval)
                            </button>
                        </form>
                    </div>
                </div>
                
                <!-- Existing Quiz Questions -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-list-ul"></i> Existing Quiz Questions</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${quizzes.isEmpty()}" class="text-center text-muted py-4">
                            <i class="bi bi-inbox" style="font-size: 48px;"></i>
                            <p class="mt-2">No quiz questions yet. Add your first question above!</p>
                        </div>
                        
                        <div th:if="${!quizzes.isEmpty()}">
                            <div class="quiz-question-card" th:each="quiz, iterStat : ${quizzes}">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h6 class="mb-0">
                                        Question <span th:text="${iterStat.index + 1}"></span>
                                    </h6>
                                    <span class="badge" 
                                          th:classappend="${quiz.status == 'PENDING'} ? 'bg-warning text-dark' : 
                                                         (${quiz.status == 'APPROVED'} ? 'bg-success' : 'bg-danger')"
                                          th:text="${quiz.status}">
                                    </span>
                                </div>
                                
                                <p class="question-text" th:text="${quiz.questionText}"></p>
                                
                                <div class="options-list">
                                    <div class="option-item" th:classappend="${quiz.correctAnswer == 'A'} ? 'correct-option' : ''">
                                        <strong>A.</strong> <span th:text="${quiz.optionA}"></span>
                                        <i th:if="${quiz.correctAnswer == 'A'}" class="bi bi-check-circle-fill text-success"></i>
                                    </div>
                                    <div class="option-item" th:classappend="${quiz.correctAnswer == 'B'} ? 'correct-option' : ''">
                                        <strong>B.</strong> <span th:text="${quiz.optionB}"></span>
                                        <i th:if="${quiz.correctAnswer == 'B'}" class="bi bi-check-circle-fill text-success"></i>
                                    </div>
                                    <div class="option-item" th:classappend="${quiz.correctAnswer == 'C'} ? 'correct-option' : ''">
                                        <strong>C.</strong> <span th:text="${quiz.optionC}"></span>
                                        <i th:if="${quiz.correctAnswer == 'C'}" class="bi bi-check-circle-fill text-success"></i>
                                    </div>
                                    <div class="option-item" th:classappend="${quiz.correctAnswer == 'D'} ? 'correct-option' : ''">
                                        <strong>D.</strong> <span th:text="${quiz.optionD}"></span>
                                        <i th:if="${quiz.correctAnswer == 'D'}" class="bi bi-check-circle-fill text-success"></i>
                                    </div>
                                </div>
                                
                                <div class="mt-3 d-flex gap-2">
                                    <a th:href="@{/counselor/modules/quiz/edit/{quizId}(quizId=${quiz.quizId})}" 
                                       class="btn btn-sm btn-outline-primary"
                                       th:if="${quiz.status == 'PENDING' or quiz.status == 'REJECTED'}">
                                        <i class="bi bi-pencil"></i> Edit
                                    </a>
                                    <a th:href="@{/counselor/modules/quiz/delete/{quizId}(quizId=${quiz.quizId})}" 
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Are you sure you want to delete this question?')"
                                       th:if="${quiz.status == 'PENDING' or quiz.status == 'REJECTED'}">
                                        <i class="bi bi-trash"></i> Delete
                                    </a>
                                    <span th:if="${quiz.status == 'APPROVED'}" class="text-muted small">
                                        <i class="bi bi-lock"></i> Approved questions cannot be edited
                                    </span>
                                </div>
                                
                                <div th:if="${quiz.adminNotes != null and !quiz.adminNotes.isEmpty()}" 
                                     class="alert alert-warning mt-2 mb-0">
                                    <strong>Admin Notes:</strong> <span th:text="${quiz.adminNotes}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
        </div>
    </div>
</main>
    <style>
        .quiz-question-card {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            margin-bottom: 16px;
        }
        
        .question-text {
            font-size: 16px;
            font-weight: 600;
            color: #212529;
            margin: 12px 0;
        }
        
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .option-item {
            padding: 10px 12px;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .option-item.correct-option {
            background: #d1f4dd;
            border-color: #10b981;
        }
        
        .option-item strong {
            color: #8b5cf6;
            margin-right: 8px;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
