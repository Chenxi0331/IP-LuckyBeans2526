<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title}">Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="page-content-wrapper" style="margin-left: 260px;">
        <div class="container py-5" style="max-width: 900px;">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="fw-bold mb-3" th:text="${post.title}">Post Title</h2>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <p class="text-muted small mb-0">
                            Posted by <span class="fw-semibold"
                                th:text="${post.author?.fullName} ?: 'Unknown User'">Author</span>
                            on <span th:text="${#temporals.format(post.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span>
                        </p>
                        <a href="/forum" class="btn btn-outline-secondary btn-sm">Back to Forum</a>
                    </div>

                    <!-- Action Buttons: Author/Admin/Counselor -->
                    <div class="mb-4"
                        th:if="${#authentication.name == post.author?.email or #authorization.expression('hasAnyRole(''ADMIN'', ''COUNSELOR'')')}">
                        <a th:href="@{/forum/edit/{id}(id=${post.id})}" class="btn btn-warning btn-sm me-2">Edit
                            Post</a>
                        <a th:href="@{/forum/delete/{id}(id=${post.id})}" class="btn btn-danger btn-sm"
                            onclick="return confirm('Delete this post permanently?');">Delete Post</a>
                    </div>

                    <p class="fs-5" th:text="${post.content}">
                        Post content goes here...
                    </p>
                </div>
            </div>

            <h4 class="mt-5 mb-3">Comments</h4>

            <div th:if="${comments.isEmpty()}">
                <div class="alert alert-info">No comments yet — be the first to reply.</div>
            </div>

            <div class="d-flex flex-column gap-3" th:each="c : ${comments}">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <p class="mb-1 fw-semibold" th:text="${c.author?.fullName} ?: 'Unknown User'">Author Name
                            </p>
                            <span class="text-muted small"
                                th:text="${#temporals.format(c.createdAt, 'MMM dd, yyyy HH:mm')}">
                                Time
                            </span>
                        </div>

                        <p class="mt-2" th:text="${c.content}">Comment text...</p>
                    </div>
                </div>
            </div>

            <div class="card mt-5 shadow-sm">
                <div class="card-body">
                    <h5 class="mb-3">Leave a Comment</h5>
                    <form th:action="@{/forum/comment}" th:object="${comment}" method="post">
                        <input type="hidden" th:value="${post.id}" name="postId" />
                        <div class="mb-3">
                            <textarea class="form-control" rows="3" th:field="*{content}"
                                placeholder="Type your comment here..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Comment</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
