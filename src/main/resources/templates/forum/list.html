<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Peer Forum Module</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .search-box {
            border-radius: 12px;
            padding: 12px 18px;
        }

        .category-chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .category-chip.active {
            background-color: #0d6efd;
            color: white;
        }

        .category-chip.inactive {
            background-color: #f1f3f5;
            color: #333;
        }

        .forum-card {
            border-radius: 14px;
        }

        .badge-category {
            background-color: #e9ecef;
            color: #333;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.75rem;
        }

        #page-content-wrapper {
            margin-left: 260px !important;
        }
    </style>
</head>

<body>

    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="page-content-wrapper" class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Peer Forum Module</h2>
            <a class="btn btn-primary px-4" href="/forum/new">+ Create Post</a>
        </div>

        <div class="mb-4">
            <form action="/forum" method="get">
                <input type="text" name="search" class="form-control search-box" placeholder="Search posts..."
                    th:value="${currentSearch}">
            </form>
        </div>

        <div class="d-flex gap-2 mb-4 flex-wrap">
            <a href="/forum" class="category-chip text-decoration-none"
                th:classappend="${currentCategory == null} ? 'active' : 'inactive'">All</a>

            <a href="/forum?category=Anxiety" class="category-chip text-decoration-none"
                th:classappend="${currentCategory == 'Anxiety'} ? 'active' : 'inactive'">Anxiety</a>

            <a href="/forum?category=Depression" class="category-chip text-decoration-none"
                th:classappend="${currentCategory == 'Depression'} ? 'active' : 'inactive'">Depression</a>

            <a href="/forum?category=Stress" class="category-chip text-decoration-none"
                th:classappend="${currentCategory == 'Stress'} ? 'active' : 'inactive'">Stress</a>

            <a href="/forum?category=Success Story" class="category-chip text-decoration-none"
                th:classappend="${currentCategory == 'Success Story'} ? 'active' : 'inactive'">Success Story</a>

            <a href="/forum?category=Community" class="category-chip text-decoration-none"
                th:classappend="${currentCategory == 'Community'} ? 'active' : 'inactive'">Community</a>

            <a href="/forum?category=General" class="category-chip text-decoration-none"
                th:classappend="${currentCategory == 'General'} ? 'active' : 'inactive'">General</a>
        </div>

        <!-- MOCK POSTS (NO THYMELEAF) -->
        <!-- POSTS LIST -->
        <div class="row gy-4">

            <div class="col-12" th:if="${posts.isEmpty()}">
                <div class="alert alert-info text-center py-4">
                    <h4>No posts yet</h4>
                    <p>Be the first to share something!</p>
                    <a href="/forum/new" class="btn btn-primary mt-2">Create Post</a>
                </div>
            </div>

            <div class="col-12" th:each="post : ${posts}">
                <div class="card forum-card shadow-sm p-3 position-relative">

                    <div class="position-absolute top-0 end-0 m-3">
                        <span class="badge-category" th:text="${post.category} ?: 'General'">General</span>
                    </div>

                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="bg-secondary text-white rounded-circle d-flex justify-content-center align-items-center"
                            style="width:45px; height:45px; font-weight:600;" th:text="${post.author?.initial} ?: 'U'">
                            UR
                        </div>

                        <div>
                            <h5 class="mb-0 fw-semibold" th:text="${post.author?.fullName} ?: 'Unknown User'">User Name
                            </h5>
                            <span class="text-muted small"
                                th:text="${#temporals.format(post.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span>
                        </div>
                    </div>

                    <h5 class="fw-bold" th:text="${post.title}">Post Title</h5>

                    <p class="text-muted mb-3" th:text="${#strings.abbreviate(post.content, 150)}">
                        Post content preview...
                    </p>

                    <div class="d-flex gap-3 text-muted small">
                        <!-- <span><i class="bi bi-hand-thumbs-up"></i> 0</span> -->
                        <!-- <span><i class="bi bi-chat"></i> 0</span> -->
                        <span>Click to view details</span>
                    </div>

                    <a th:href="@{/forum/post/{id}(id=${post.id})}" class="stretched-link"></a>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.js"></script>

</body>

</html>
