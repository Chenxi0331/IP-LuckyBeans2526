<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chats - Innerly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .chat-list-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 4px solid transparent;
        }

        .chat-list-card:hover {
            transform: translateX(5px);
            border-left-color: #a855f7;
            background-color: #f8fafc;
        }

        .student-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a855f7, #9333ea);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <!-- NAVBAR Fragment -->
    <div th:replace="fragments/navbar :: navbar"></div>

    <!-- MAIN CONTENT -->
    <div id="page-content-wrapper" style="margin-left: 260px; min-height: 100vh; background-color: #f8fafc;">
        <div class="container-fluid p-4">
            <div class="header mb-4">
                <h2 class="fw-bold" style="color: #a855f7;">My Chats</h2>
                <p class="text-muted">Ongoing conversations with students</p>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-0">
                            <div th:if="${chats.empty}" class="text-center p-5">
                                <span class="material-icons text-muted"
                                    style="font-size: 48px;">chat_bubble_outline</span>
                                <p class="mt-3 text-muted">No active chats found.</p>
                            </div>

                            <div th:unless="${chats.empty}" class="list-group list-group-flush">
                                <a th:each="chat : ${chats}" th:href="@{/chatbot/room/{id}(id=${chat.id})}"
                                    class="list-group-item list-group-item-action p-4 border-0 border-bottom chat-list-card">
                                    <div class="d-flex align-items-center justify-content-between">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="student-avatar">
                                                <span
                                                    th:text="${chat.student.initial != null ? chat.student.initial : 'S'}">S</span>
                                            </div>
                                            <div>
                                                <h5 class="mb-1 fw-bold" th:text="${chat.student.fullName}">Student Name
                                                </h5>
                                                <p class="mb-0 text-muted small">
                                                    Started: <span
                                                        th:text="${#temporals.format(chat.createdAt, 'MMM dd, yyyy HH:mm')}">Jan
                                                        1</span>
                                                </p>
                                            </div>
                                        </div>
                                        <div class="text-end">
                                            <span class="badge"
                                                th:classappend="${chat.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                                                th:text="${chat.status}">ACTIVE</span>
                                            <div class="small text-muted mt-1">
                                                Last activity: <span
                                                    th:text="${chat.lastMessageAt != null ? #temporals.format(chat.lastMessageAt, 'MMM dd, HH:mm') : '-'}">-</span>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
